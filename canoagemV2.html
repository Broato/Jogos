<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Canoagem Épica</title>

<style>
body {
  font-family: Arial;
  background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size: cover;
  color: white;
  padding: 20px;
}

#container {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

#chat {
  margin-bottom: 20px;
}

button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#barra {
  background: gray;
  height: 20px;
  margin-bottom: 10px;
}

#aura {
  height: 100%;
  width: 0%;
  background: yellow;
}

</style>
</head>

<body>

<div id="container">

<h1>🛶 Canoagem Épica</h1>

<p><b>Objetivo:</b> Escolhe a melhor canoa e completa a jornada para ganhar a <b>Aura Eterna</b>.</p>

<div id="barra"></div>
<div id="aura"></div>
<p id="auraTexto">Aura: 0</p>

<div id="chat"></div>

<input id="input" placeholder="Escreve aqui...">
<button onclick="responder()">Enviar</button>

</div>

<script>

let etapa = 0;
let nome = "";
let aura = 0;

function atualizarAura(valor){
  aura += valor;
  if(aura < 0) aura = 0;
  if(aura > 100) aura = 100;

  document.getElementById("aura").style.width = aura + "%";
  document.getElementById("auraTexto").innerText = "Aura: " + aura;
}

function escrever(texto){
  let div = document.createElement("div");
  div.innerHTML = texto;
  document.getElementById("chat").appendChild(div);
}

function limpar(){
  document.getElementById("input").value = "";
}

function responder(){
  let val = document.getElementById("input").value;
  limpar();

  if(etapa === 0){
    nome = val;
    escrever("👤 " + nome);
    escrever("Bem-vindo à canoagem, " + nome + "!");
    escrever("Escolhe uma canoa:");
    criarBotoes(["Canoa do Tiago","Canoa Ouro","Canoa de Aura"]);
    etapa = 1;
  }
}

function criarBotoes(lista){
  lista.forEach(op => {
    let b = document.createElement("button");
    b.innerText = op;
    b.onclick = () => escolha(op);
    document.getElementById("chat").appendChild(b);
  });
}

function escolha(op){
  escrever("👉 " + op);

  if(op === "Canoa do Tiago"){
    escrever("💀 A canoa afundou imediatamente!");
    atualizarAura(-20);
    fim("Beta total 💀");
  }

  if(op === "Canoa Ouro"){
    escrever("🌳 Encontras um elfo guardião.");
    escrever("Pergunta: Quem tem mais aura?");
    criarBotoes(["Broato","Cristiano Ronaldo","Todos"]);
  }

  if(op === "Canoa de Aura"){
    escrever("🌌 Foste para o plano astral.");
    escrever("Deus Broato pergunta: número com mais aura?");
    etapa = 2;
  }
}

document.getElementById("input").addEventListener("keydown", e => {
  if(e.key === "Enter") responderExtra();
});

function responderExtra(){
  let val = document.getElementById("input").value;
  limpar();

  if(etapa === 2){
    escrever("👉 " + val);
    if(val === "67"){
      atualizarAura(100);
      escrever("✨ Completaste a jornada!");
      fim("DEUS SUPREMO 🟡");
    } else {
      escrever("💨 Plano astral destruído!");
      atualizarAura(-50);
      fim("Falhaste...");
    }
  }
}

function fim(rank){
  escrever("<br><b>🏁 Resultado: " + rank + "</b>");
}

escrever("Qual é o teu nome?");
</script>

</body>
</html>
