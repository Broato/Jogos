<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Canoagem Épica</title>

<style>
body {
  font-family: Arial;
  background: url("https://images.unsplash.com/photo-1507525428034-b723cf961d3e");
  background-size: cover;
  color: white;
  padding: 20px;
}

#box {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#barra {
  background: gray;
  height: 20px;
}

#aura {
  height: 100%;
  width: 0%;
  background: yellow;
}
</style>
</head>

<body>

<div id="box">

<h1>🛶 Canoagem Épica</h1>
<p>Objetivo: ganha a Aura Eterna</p>

<div id="barra"><div id="aura"></div></div>
<p id="auraTxt">Aura: 0</p>

<div id="chat"></div>
<div id="botoes"></div>

</div>

<script>

let aura = 0;

function setAura(valor){
  aura += valor;
  if(aura < 0) aura = 0;
  if(aura > 100) aura = 100;

  document.getElementById("aura").style.width = aura + "%";
  document.getElementById("auraTxt").innerText = "Aura: " + aura;
}

function escrever(txt){
  let div = document.createElement("div");
  div.innerHTML = txt;
  document.getElementById("chat").appendChild(div);
}

function limparBotoes(){
  document.getElementById("botoes").innerHTML = "";
}

function criarBotao(txt, func){
  let b = document.createElement("button");
  b.innerText = txt;
  b.onclick = func;
  document.getElementById("botoes").appendChild(b);
}

// --- INÍCIO ---
function start(){
  escrever("Bem-vindo à canoagem!");
  escrever("Escolhe a tua canoa:");
  limparBotoes();

  criarBotao("Canoa do Tiago", canoaTiago);
  criarBotao("Canoa Ouro", canoaOuro);
  criarBotao("Canoa de Aura", canoaAura);
}

// --- CAMINHOS ---
function canoaTiago(){
  limparBotoes();
  escrever("💀 A canoa afundou! Kruger destruiu tudo.");
  setAura(-20);
  criarBotao("Respawn", reset);
}

function canoaOuro(){
  limparBotoes();
  escrever("🌳 Um elfo bloqueia o caminho.");
  escrever("Pergunta: Quem tem mais aura?");
  
  criarBotao("Broato", falhaElfo);
  criarBotao("Cristiano Ronaldo", falhaElfo);
  criarBotao("Todos", certoElfo);
}

function falhaElfo(){
  limparBotoes();
  escrever("❌ Errado! O elfo não te deixa passar.");
  setAura(-10);
  criarBotao("Resetar", reset);
}

function certoElfo(){
  limparBotoes();
  escrever("😈 Certo... mas ele prometeu nunca deixar passar.");
  criarBotao("Resetar", reset);
}

function canoaAura(){
  limparBotoes();
  escrever("🌌 Plano astral...");
  escrever("Qual é o número com mais aura?");
  
  let input = document.createElement("input");
  let btn = document.createElement("button");

  btn.innerText = "Responder";

  btn.onclick = () => {
    if(input.value == "67"){
      escrever("✨ És digno!");
      setAura(100);
      final("DEUS SUPREMO 🟡");
    } else {
      escrever("💨 Tudo destruído...");
      setAura(-50);
      criarBotao("Resetar", reset);
    }
  };

  document.getElementById("botoes").appendChild(input);
  document.getElementById("botoes").appendChild(btn);
}

// --- FINAL ---
function final(rank){
  limparBotoes();
  escrever("<br><b>🏁 Ranking: " + rank + "</b>");
}

// --- RESET ---
function reset(){
  location.reload();
}

// START
start();

</script>

</body>
</html>
