<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<title>Canoagem Épica - Final</title>

<style>
body {
  font-family: Arial;
  background: url("https://img.nauticexpo.com/pt/images_ne/photo-mg/20958-7293715.jpg");
  background-size: cover;
  color: white;
  padding: 20px;
}

#box {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  border-radius: 15px;
  max-width: 600px;
  margin: auto;
}

button {
  margin: 5px;
  padding: 10px;
  border-radius: 10px;
  border: none;
  cursor: pointer;
}

#barra {
  background: gray;
  height: 20px;
}

#aura {
  height: 100%;
  width: 0%;
  background: yellow;
}

#inputBox {
  margin-top: 10px;
  padding: 10px;
  width: 80%;
  border-radius: 8px;
  border: none;
}
</style>
</head>

<body>

<div id="box">
  <h1>🛶 Canoagem Épica</h1>
  <p>Objetivo: ganha a Aura Eterna</p>

  <div id="barra"><div id="aura"></div></div>
  <p id="auraTxt">Aura: 0</p>

  <div id="chat"></div>
  <div id="botoes"></div>

  <input id="inputBox" placeholder="Escreve aqui..." />
  <button onclick="responder()">Enviar</button>
</div>

<script>
let aura = 0;
let modo = ""; // controla se estamos no input

// --- FUNÇÕES AUXILIARES ---
function setAura(valor){
  aura += valor;
  if(aura < 0) aura = 0;
  if(aura > 100) aura = 100;
  document.getElementById("aura").style.width = aura + "%";
  document.getElementById("auraTxt").innerText = "Aura: " + aura;
}

function escrever(txt){
  let div = document.createElement("div");
  div.innerHTML = txt;
  document.getElementById("chat").appendChild(div);
  document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
}

function limparBotoes(){
  document.getElementById("botoes").innerHTML = "";
}

function criarBotao(txt, func){
  let b = document.createElement("button");
  b.innerText = txt;
  b.onclick = func;
  document.getElementById("botoes").appendChild(b);
}

// --- JOGO ---
function start(){
  escrever("Bem-vindo à Canoagem Épica!");
  escrever("Escolhe a tua canoa:");
  limparBotoes();
  criarBotao("Canoa do Tiago", canoaTiago);
  criarBotao("Canoa Ouro", canoaOuro);
  criarBotao("Canoa de Aura", canoaAura);
}

// Caminho Canoa do Tiago
function canoaTiago(){
  limparBotoes();
  escrever("💀 A canoa afundou e perdeste toda a tua aura...");
  setAura(-999);
  criarBotao("Respawn", reset);
}

// Caminho Canoa Ouro
function canoaOuro(){
  limparBotoes();
  escrever("🌳 Um elfo grego bloqueia o caminho.");
  escrever("Pergunta: Quem tem mais aura?");
  
  criarBotao("Broato", falhaElfo);
  criarBotao("Cristiano Ronaldo", falhaElfo);
  criarBotao("Papai Diogo Games", falhaElfo);
  criarBotao("El Pepe", falhaElfo);
  criarBotao("Diéééééégo", falhaElfo);
  criarBotao("Nigga da Venezuela", falhaElfo);
  criarBotao("Todos os mencionados", certoElfo);
}

function falhaElfo(){
  limparBotoes();
  escrever("❌ Errado! O elfo não te deixa passar.");
  setAura(-50);
  criarBotao("Resetar", reset);
}

function certoElfo(){
  limparBotoes();
  escrever("😈 Certo! Mas ele prometeu NUNCA MAIS deixar passar um betinha.");
  criarBotao("Resetar", reset);
}

// Caminho Canoa de Aura
function canoaAura(){
  limparBotoes();
  escrever("🌌 Teletransportando para o Plano Astral...");
  escrever("👑 Deus Broato pergunta:");
  escrever("Qual é o número com mais aura?");
  modo = "aura";
}

// --- INPUT ---
function responder(){
  let val = document.getElementById("inputBox").value.trim();
  if(modo === "aura"){
    if(val == "67"){
      escrever("✨ És digno!");
      escrever("Aproveita a AURA ETERNA!");
      setAura(100);
      final("DEUS SUPREMO 🟡");
    } else {
      escrever("💨 Plano astral é destruído...");
      setAura(0);
      criarBotao("Resetar", reset);
    }
  }
  document.getElementById("inputBox").value = "";
}

// --- FINAL ---
function final(rank){
  limparBotoes();
  escrever("<br><b>🏁 Ranking: " + rank + "</b>");
}

// --- RESET ---
function reset(){
  location.reload();
}

// --- START ---
start();

</script>
</body>
</html>
